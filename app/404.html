<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Sayfa Bulunamadı | AresPipe</title>
<script>(function(){var t=localStorage.getItem('ares_theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.style.visibility='hidden';})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
[data-theme=dark]{
  --bg:#0d1117;--sur:#161b24;--bor:#262f3e;
  --tx:#e6ecf4;--txm:#94a3b8;--txd:#6b7a90;
  --ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;
}
[data-theme=light-anthracite]{
  --bg:#d8dde4;--sur:#e4e9ef;--bor:#bcc5d0;
  --tx:#141e2b;--txm:#3a4f63;--txd:#637080;
  --ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);color:var(--tx);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
  position:relative;
}

/* Arka plan grid deseni */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(var(--bor) 1px, transparent 1px),
    linear-gradient(90deg, var(--bor) 1px, transparent 1px);
  background-size:48px 48px;
  opacity:.4;
  pointer-events:none;
}

/* Işık efekti */
body::after{
  content:'';position:fixed;
  width:600px;height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(229,62,62,.08) 0%, transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-60%);
  pointer-events:none;
}

.container{
  position:relative;z-index:1;
  text-align:center;
  padding:40px 20px;
  animation:fadeUp .6s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

/* 404 büyük yazı */
.big-num{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(120px, 20vw, 200px);
  font-weight:900;
  line-height:1;
  letter-spacing:-4px;
  color:var(--re);
  opacity:.15;
  position:relative;
  user-select:none;
}

.icon-wrap{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:80px;height:80px;
  background:rgba(229,62,62,.12);
  border:1px solid rgba(229,62,62,.25);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
}

.title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(24px,4vw,36px);
  font-weight:800;
  color:var(--tx);
  margin:12px 0 8px;
  letter-spacing:.5px;
}

.desc{
  font-size:15px;color:var(--txm);
  max-width:400px;margin:0 auto 32px;
  line-height:1.6;
}

.actions{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;border-radius:10px;
  font-size:14px;font-weight:600;
  font-family:'Barlow',sans-serif;
  cursor:pointer;text-decoration:none;
  transition:all .15s;border:none;
}
.btn-primary{
  background:var(--ac);color:#fff;
}
.btn-primary:hover{opacity:.85;}
.btn-outline{
  background:none;border:1px solid var(--bor);
  color:var(--txm);
}
.btn-outline:hover{border-color:var(--tx);color:var(--tx);}

/* Logo */
.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;font-weight:900;
  color:var(--ac);letter-spacing:1px;
  margin-bottom:40px;
  display:block;
  opacity:.7;
}

/* Pipe animasyonu */
.pipe-line{
  display:flex;align-items:center;justify-content:center;
  gap:0;margin:24px 0;opacity:.2;
}
.pipe-seg{
  width:32px;height:8px;
  background:var(--txd);
  border-radius:0;
}
.pipe-seg:first-child{border-radius:4px 0 0 4px;}
.pipe-seg:last-child{border-radius:0 4px 4px 0;}
.pipe-joint{
  width:14px;height:14px;
  background:var(--txd);
  border-radius:50%;
  position:relative;
}
.pipe-broken{
  width:20px;height:8px;
  background:transparent;
  border-top:2px dashed var(--re);
  opacity:1 !important;
  animation:blink 1.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:.8;}}
</style>
</head>
<body>
<div class="container">
  <span class="logo">⬡ AresPipe</span>

  <div class="pipe-line">
    <div class="pipe-seg"></div>
    <div class="pipe-joint"></div>
    <div class="pipe-seg"></div>
    <div class="pipe-joint"></div>
    <div class="pipe-broken"></div>
    <div class="pipe-joint" style="opacity:.3;"></div>
    <div class="pipe-seg" style="opacity:.2;"></div>
  </div>

  <div style="position:relative;display:inline-block;">
    <div class="big-num">404</div>
    <div class="icon-wrap">🔍</div>
  </div>

  <div class="title">Sayfa Bulunamadı</div>
  <div class="desc">Aradığınız sayfa mevcut değil veya taşınmış olabilir. Boru hattında bir kırık var gibi görünüyor.</div>

  <div class="actions">
    <a href="index.html" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ana Sayfaya Dön
    </a>
    <a href="javascript:history.back()" class="btn btn-outline">
      ← Geri Git
    </a>
  </div>
</div>

<script>document.documentElement.style.visibility='';</script>
</body>
</html>
