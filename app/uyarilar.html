<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uyarılar | AresPipe</title>
<script>(function(){var t=localStorage.getItem('syos_theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}



/* SIDEBAR */

[data-theme="dark"] .icon-sun{display:block!important;}[data-theme="dark"] .icon-moon{display:none!important;}
[data-theme="light"] .icon-sun{display:none!important;}[data-theme="light"] .icon-moon{display:block!important;}
[data-theme="slate"] .icon-sun{display:block!important;}[data-theme="slate"] .icon-moon{display:none!important;}
[data-theme="navy"] .icon-sun{display:block!important;}[data-theme="navy"] .icon-moon{display:none!important;}

.page{padding:24px 28px;padding-top:32px;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-title-label{font-size:12px;color:var(--txd);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}

/* STAT */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si-r{background:rgba(229,62,62,.12);color:var(--re);}
.si-a{background:rgba(217,119,6,.12);color:var(--warn);}
.si-b{background:rgba(45,142,255,.12);color:var(--ac);}
.si-g{background:rgba(22,163,110,.12);color:var(--gr);}
.stat-label{font-size:11px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--tx);line-height:1;}

/* SEKMELER */
.tab-bar{display:flex;gap:2px;border-bottom:2px solid var(--bor);margin-bottom:20px;}
.tab-btn{padding:10px 20px;background:transparent;border:none;font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;color:var(--txd);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;display:flex;align-items:center;gap:7px;}
.tab-btn:hover{color:var(--tx);}
.tab-btn.active{color:var(--re);border-bottom-color:var(--re);font-weight:600;}
.tab-btn.active .tc{background:rgba(229,62,62,.15);color:var(--re);}
.tc{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:18px;border-radius:99px;font-size:11px;font-weight:700;padding:0 5px;background:var(--sur2);color:var(--txd);}
.panel{display:none;}.panel.on{display:block;}

/* FİLTRE */
.fbar{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:12px 18px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.fsel{padding:7px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:13px;font-family:'Barlow',sans-serif;outline:none;}
.fsel:focus{border-color:var(--re);}

/* UYARI KARTI */
.ukart{border-radius:14px;overflow:hidden;margin-bottom:10px;border:1px solid var(--bor);background:var(--sur);display:flex;transition:all 0.2s;}
.ukart.yeni{border-color:rgba(229,62,62,.35);background:rgba(229,62,62,.03);}
.ukart.goruldu{opacity:0.75;}
.ukart-sol{width:5px;flex-shrink:0;}
.uk-kritik{background:var(--re);}
.uk-uyari{background:var(--warn);}
.uk-bilgi{background:var(--ac);}
.ukart-ic{flex:1;padding:14px 18px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.ukart-ikon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.uk-ikon-kritik{background:rgba(229,62,62,.12);}
.uk-ikon-uyari{background:rgba(217,119,6,.12);}
.uk-ikon-bilgi{background:rgba(45,142,255,.12);}
.ukart-tip{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:3px;}
.ukart-baslik{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:3px;}
.ukart-aciklama{font-size:12px;color:var(--txm);line-height:1.5;}
.ukart-meta{font-size:11px;color:var(--txd);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;}
.goruldu-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 7px;border-radius:99px;background:var(--sur2);color:var(--txd);}

/* BUTON */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;font-family:'Barlow',sans-serif;}
.btn-g{background:transparent;color:var(--txm);border:1px solid var(--bor);}.btn-g:hover{background:var(--sur2);color:var(--tx);}
.btn-re{background:rgba(229,62,62,.10);color:var(--re);border:1px solid rgba(229,62,62,.25);}.btn-re:hover{background:rgba(229,62,62,.18);}
.btn-sm{padding:5px 11px;font-size:12px;}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.mbox{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:24px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,0.5);}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.mtitle{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;}
.mcl{background:none;border:none;color:var(--txd);font-size:22px;cursor:pointer;line-height:1;}.mcl:hover{color:var(--tx);}
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.fi{width:100%;padding:8px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:13px;font-family:'Barlow',sans-serif;outline:none;}
.fi:focus{border-color:var(--ac);}
.fta{width:100%;padding:8px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:13px;font-family:'Barlow',sans-serif;outline:none;resize:vertical;min-height:68px;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:1100;animation:tin 0.3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.t-ok{border-left:3px solid var(--gr);}.t-er{border-left:3px solid var(--re);}.t-in{border-left:3px solid var(--ac);}
@keyframes tin{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}


/* SOL KENAR RENK (Kural B-01) */
.cl-ac{border-left:3px solid var(--ac) !important;}
.cl-gr{border-left:3px solid var(--gr) !important;}
.cl-re{border-left:3px solid var(--re) !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg{border-left:3px solid var(--leg) !important;}
.bos{text-align:center;padding:48px 24px;color:var(--txd);}
</style>
<script src="ares-store.js"></script>
<script src="ares-layout.js"></script>
</head>
<body>

<div class="app-shell">

<div class="main-content">
<div class="page">

<div class="page-header">
  <div>
    <div class="breadcrumb"><a href="index.html">Ana Sayfa</a><span>/</span><span>Uyarılar</span></div>
    <h1 class="page-title">Uyarılar</h1>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-g btn-sm" onclick="tumunuGorulduYap()">Tümünü Okundu İşaretle</button>
    <button class="btn btn-re btn-sm" onclick="tumunuSil()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Tümünü Temizle
    </button>
    <button class="btn btn-g btn-sm" onclick="manuelUyariAc()" style="border-color:rgba(14,165,233,0.3);color:var(--ac);">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Manuel Uyarı Ekle
    </button>
  </div>
</div>

<!-- STAT -->
<div class="stat-row">
  <div class="stat-card cl-re"><div class="stat-icon si-r"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="stat-label">Kritik</div><div class="stat-value" id="sCritik">0</div></div></div>
  <div class="stat-card cl-warn"><div class="stat-icon si-a"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div><div class="stat-label">Uyarı</div><div class="stat-value" id="sUyari">0</div></div></div>
  <div class="stat-card cl-ac"><div class="stat-icon si-b"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div><div class="stat-label">Yeni / Görülmemiş</div><div class="stat-value" id="sYeni">0</div></div></div>
  <div class="stat-card cl-gr"><div class="stat-icon si-g"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="stat-label">Görüldü</div><div class="stat-value" id="sGoruldu">0</div></div></div>
</div>

<!-- SEKMELER -->
<div class="tab-bar">
  <button class="tab-btn active" data-tab="aktif">Aktif Uyarılar <span class="tc" id="tAktif">0</span></button>
  <button class="tab-btn" data-tab="goruldu">Görüldü <span class="tc" id="tGoruldu">0</span></button>
  <button class="tab-btn" data-tab="hepsi">Tümü <span class="tc" id="tHepsi">0</span></button>
</div>

<div class="fbar cl-re">
  <select class="fsel" id="fKategori" onchange="renderAktif()">
    <option value="">Tüm Kategoriler</option>
    <option value="devre">Hareketsiz Devre</option>
    <option value="personel">Personel</option>
    <option value="sistem">Sistem</option>
    <option value="manuel">Manuel</option>
  </select>
  <select class="fsel" id="fSeviye" onchange="renderAktif()">
    <option value="">Tüm Seviyeler</option>
    <option value="kritik">Kritik</option>
    <option value="uyari">Uyarı</option>
    <option value="bilgi">Bilgi</option>
  </select>
</div>

<div class="panel on" id="panelAktif"><div id="listeAktif"></div></div>
<div class="panel" id="panelGoruldu"><div id="listeGoruldu"></div></div>
<div class="panel" id="panelHepsi"><div id="listeHepsi"></div></div>

</div><!-- /.page -->
</div><!-- /.main-content -->
</div><!-- /.app-shell -->

<!-- ===== MANUEL UYARI EKLE MODAL ===== -->
<div id="mManuel" class="mov" style="display:none;">
  <div class="mbox">
    <div class="mhead"><div class="mtitle">Manuel Uyarı Ekle</div><button class="mcl" onclick="document.getElementById('mManuel').style.display='none'">✕</button></div>
    <div class="fr2 fg">
      <div>
        <label class="fl">Kategori</label>
        <select class="fi" id="mKat">
          <option value="manuel">Manuel</option>
          <option value="devre">Devre</option>
          <option value="personel">Personel</option>
          <option value="sistem">Sistem</option>
        </select>
      </div>
      <div>
        <label class="fl">Seviye</label>
        <select class="fi" id="mSev">
          <option value="kritik">Kritik</option>
          <option value="uyari">Uyarı</option>
          <option value="bilgi">Bilgi</option>
        </select>
      </div>
    </div>
    <div class="fg"><label class="fl">Başlık <span style="color:var(--re)">*</span></label><input class="fi" id="mBaslik" placeholder="Uyarı başlığı..."></div>
    <div class="fg"><label class="fl">Açıklama</label><textarea class="fta" id="mAciklama" placeholder="Detay..."></textarea></div>
    <div class="fg"><label class="fl">İlgili Kaynak</label><input class="fi" id="mKaynak" placeholder="Tersane, devre, personel adı..."></div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-g" style="flex:1;" onclick="document.getElementById('mManuel').style.display='none'">İptal</button>
      <button class="btn" style="flex:2;background:var(--re);color:#fff;" onclick="manuelKaydet()">Uyarı Ekle</button>
    </div>
  </div>
</div>

<!-- ===== SİL ONAY MODAL ===== -->
<div id="mSil" class="mov" style="display:none;">
  <div class="mbox" style="max-width:380px;">
    <div class="mhead"><div class="mtitle">Uyarıyı Kaldır</div><button class="mcl" onclick="document.getElementById('mSil').style.display='none'">✕</button></div>
    <div style="font-size:13px;color:var(--txm);margin-bottom:16px;" id="mSilMetin">Bu uyarıyı listeden kaldırmak istediğinizden emin misiniz?</div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-g" style="flex:1;" onclick="document.getElementById('mSil').style.display='none'">İptal</button>
      <button class="btn btn-re" style="flex:1;" id="mSilOnayla">Kaldır</button>
    </div>
  </div>
</div>

<script>
// ===== VERİ =====
let uyarilar = (typeof SYOS !== 'undefined') ? SYOS.uyarilar() : [
  {
    id:'U001', kategori:'devre', seviye:'kritik', goruldu:false,
    baslik:'Hareketsiz Devre: bilge-001',
    aciklama:'NB1099 / MV Atlas — bilge-001 devresinde 15/20 spool tamamlanmış ancak 72 saat hareketsizlik tespit edildi.',
    kaynak:'Sedef Tersanesi / NB1099',
    link:'devre_detay_sayfasi.html',
    olusturma:'26.03.2026 14:22', ikon:'⏸️'
  },
  {
    id:'U002', kategori:'devre', seviye:'uyari', goruldu:false,
    baslik:'Hareketsiz Devre: fw-main',
    aciklama:'NB1120 / Poseidon 7 — fw-main devresinde 2/4 spool tamamlanmış, 51 saat hareketsizlik tespit edildi.',
    kaynak:'Sedef Tersanesi / NB1120',
    link:'devre_detay_sayfasi.html',
    olusturma:'27.03.2026 09:10', ikon:'⏸️'
  },
  {
    id:'U003', kategori:'personel', seviye:'uyari', goruldu:false,
    baslik:'Sağlık Raporu Süresi Dolmak Üzere',
    aciklama:'Mehmet Demir (İmalatçı) — Sağlık raporu 12 gün içinde sona erecek. Yenilenmesi gerekiyor.',
    kaynak:'Mehmet Demir', link:'personel.html',
    olusturma:'27.03.2026 08:00', ikon:'🏥'
  },
  {
    id:'U004', kategori:'personel', seviye:'uyari', goruldu:true,
    baslik:'Kaynak Sertifikası Süresi Dolmak Üzere',
    aciklama:'Ali Kaya (Kaynakçı) — WPS sertifikası 20 gün içinde sona erecek.',
    kaynak:'Ali Kaya', link:'personel.html',
    olusturma:'25.03.2026 10:15', ikon:'📜'
  },
  {
    id:'U005', kategori:'sistem', seviye:'bilgi', goruldu:true,
    baslik:'Devre Kalite Kontrole Gönderildi',
    aciklama:'265-overboard devresi (NB1099) kalite kontrol listesine eklendi.',
    kaynak:'Sedef Tersanesi / NB1099', link:'kalite_kontrol.html',
    olusturma:'24.03.2026 16:40', ikon:'✅'
  },
];

let uyariSayac = 6;

// ===== RENDER =====
const seviyeConfig = {
  kritik: { renk:'var(--re)',   sinif:'uk-kritik',    ikonSinif:'uk-ikon-kritik',  badge:'br' },
  uyari:  { renk:'var(--warn)', sinif:'uk-uyari',     ikonSinif:'uk-ikon-uyari',   badge:'ba' },
  bilgi:  { renk:'var(--ac)',   sinif:'uk-bilgi',     ikonSinif:'uk-ikon-bilgi',   badge:'bb' },
};
const kategoriLabel = { devre:'Hareketsiz Devre', personel:'Personel', sistem:'Sistem', manuel:'Manuel' };

function aktifFiltrele(liste) {
  const kat = document.getElementById('fKategori').value;
  const sev = document.getElementById('fSeviye').value;
  return liste.filter(u => (!kat||u.kategori===kat) && (!sev||u.seviye===sev));
}

function renderAktif() {
  const tab = document.querySelector('.tab-btn.active')?.dataset.tab || 'aktif';
  renderTab(tab);
}

function renderTab(tab) {
  let src;
  if (tab==='aktif')   src = uyarilar.filter(u=>!u.goruldu);
  else if (tab==='goruldu') src = uyarilar.filter(u=>u.goruldu);
  else                 src = [...uyarilar];

  src = aktifFiltrele(src);
  // Sıralama: kritik önce, sonra tarih
  src.sort((a,b)=>{
    const sev = {kritik:0,uyari:1,bilgi:2};
    return (sev[a.seviye]||2)-(sev[b.seviye]||2) || b.id.localeCompare(a.id);
  });

  const elId = {aktif:'listeAktif',goruldu:'listeGoruldu',hepsi:'listeHepsi'}[tab];
  const el = document.getElementById(elId);
  if (!src.length) {
    el.innerHTML = '<div class="bos">'+
      (tab==='aktif'?'<div style="font-size:36px;margin-bottom:12px;">✅</div><div>Aktif uyarı yok</div>':'Kayıt yok')+
      '</div>'; return;
  }
  el.innerHTML = src.map(uyariKartHtml).join('');
}

function uyariKartHtml(u) {
  const cfg = seviyeConfig[u.seviye] || seviyeConfig.bilgi;
  return `<div class="ukart${u.goruldu?'' :' yeni'}${u.goruldu?' goruldu':''}" id="ukart-${u.id}">
    <div class="ukart-sol ${cfg.sinif}"></div>
    <div class="ukart-ic">
      <div style="display:flex;align-items:flex-start;gap:12px;flex:1;min-width:0;">
        <div class="ukart-ikon ${cfg.ikonSinif}">${u.ikon}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;">
            <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:${cfg.renk};">${kategoriLabel[u.kategori]||u.kategori}</span>
            ${!u.goruldu?'<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:1px 6px;border-radius:99px;background:rgba(239,68,68,0.15);color:var(--re);">● YENİ</span>':''}
          </div>
          <div class="ukart-baslik">${u.baslik}</div>
          <div class="ukart-aciklama">${u.aciklama}</div>
          <div class="ukart-meta">
            <span>📍 ${u.kaynak}</span>
            <span>🕐 ${u.olusturma}</span>
            ${u.goruldu?'<span class="goruldu-badge">✓ Görüldü</span>':''}
          </div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;align-items:flex-end;">
        ${u.link?`<a href="#" onclick="navigateUyari(u)" class="btn btn-g btn-sm" style="font-size:11px;">Git →</a>`:''}
        ${!u.goruldu?`<button class="btn btn-g btn-sm" style="font-size:11px;" onclick="gorulduYap('${u.id}')">✓ Okundu</button>`:''}
        <button class="btn btn-re btn-sm" style="font-size:11px;" onclick="silOnay('${u.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          Kaldır
        </button>
      </div>
    </div>
  </div>`;
}

// ===== AKSİYONLAR =====
function gorulduYap(id) {
  const u = uyarilar.find(x=>x.id===id); if(!u) return;
  u.goruldu = true;
  if (typeof SYOS !== 'undefined') SYOS.uyariGoruldu(id);
  renderHepsi(); guncelBell(); guncelStatler();
  showToast('Uyarı okundu olarak işaretlendi','success');
}

function tumunuGorulduYap() {
  uyarilar.forEach(u=>{ u.goruldu=true; if(typeof SYOS!=='undefined') SYOS.uyariGoruldu(u.id); });
  renderHepsi(); guncelBell(); guncelStatler();
  showToast('Tüm uyarılar okundu','success');
}

function silOnay(id) {
  const u = uyarilar.find(x=>x.id===id);
  document.getElementById('mSilMetin').innerHTML =
    `"<strong>${u?.baslik||id}</strong>" uyarısını listeden tamamen kaldırmak istiyor musunuz?`;
  document.getElementById('mSilOnayla').onclick = ()=>sil(id);
  document.getElementById('mSil').style.display = 'flex';
}

function sil(id) {
  uyarilar = uyarilar.filter(u=>u.id!==id);
  if (typeof SYOS !== 'undefined') SYOS.uyariSil(id);
  document.getElementById('mSil').style.display = 'none';
  renderHepsi(); guncelBell(); guncelStatler();
  showToast('Uyarı kaldırıldı','success');
}

function tumunuSil() {
  const kat = document.getElementById('fKategori').value;
  const sev = document.getElementById('fSeviye').value;
  if (kat||sev) {
    const kalacak = uyarilar.filter(u=>(kat&&u.kategori!==kat)||(sev&&u.seviye!==sev));
    uyarilar.filter(u=>!kalacak.includes(u)).forEach(u=>{ if(typeof SYOS!=='undefined') SYOS.uyariSil(u.id); });
    uyarilar = kalacak;
    showToast('Filtredeki uyarılar kaldırıldı','success');
  } else {
    if (!confirm('Tüm uyarıları listeden kaldırmak istiyor musunuz?')) return;
    uyarilar.forEach(u=>{ if(typeof SYOS!=='undefined') SYOS.uyariSil(u.id); });
    uyarilar = [];
    showToast('Tüm uyarılar temizlendi','success');
  }
  renderHepsi(); guncelBell(); guncelStatler();
}

// ===== MANUEL UYARI =====
function manuelUyariAc() {
  document.getElementById('mKat').value='manuel';
  document.getElementById('mSev').value='uyari';
  document.getElementById('mBaslik').value='';
  document.getElementById('mAciklama').value='';
  document.getElementById('mKaynak').value='';
  document.getElementById('mManuel').style.display='flex';
}

function manuelKaydet() {
  const baslik = document.getElementById('mBaslik').value.trim();
  if (!baslik) { showToast('Başlık zorunlu','error'); return; }
  const kat = document.getElementById('mKat').value;
  const sev = document.getElementById('mSev').value;
  const ikonMap = {devre:'⏸️',personel:'👤',sistem:'⚙️',manuel:'📌'};

  let id;
  if (typeof SYOS !== 'undefined') {
    id = SYOS.uyariEkle(kat, sev, baslik,
      document.getElementById('mAciklama').value.trim(),
      document.getElementById('mKaynak').value.trim()||'Manuel giriş',
      '', ikonMap[kat]||'📌'
    );
    uyarilar = SYOS.uyarilar();
  } else {
    id = 'U' + String(uyariSayac).padStart(3,'0'); uyariSayac++;
    uyarilar.unshift({
      id, kategori:kat, seviye:sev, goruldu:false, baslik,
      aciklama:document.getElementById('mAciklama').value.trim(),
      kaynak:document.getElementById('mKaynak').value.trim()||'Manuel giriş',
      link:'', olusturma:new Date().toLocaleString('tr-TR'), ikon:ikonMap[kat]||'📌'
    });
  }

  document.getElementById('mManuel').style.display='none';
  renderHepsi(); guncelBell(); guncelStatler();
  showToast('Uyarı eklendi','success');
}

// ===== BELL & STAT =====
function guncelBell() {
  const yeniSayisi = uyarilar.filter(u=>!u.goruldu).length;
  const bell = document.getElementById('bellBtn');
  const bellSayac = document.getElementById('bellSayac');
  const navBadge = document.getElementById('navBadge');

  if (yeniSayisi > 0) {
    bell?.classList.add('uyari-bell-yeni');
    if (bellSayac) { bellSayac.textContent=yeniSayisi; bellSayac.style.display='flex'; }
    if (navBadge)  { navBadge.textContent=yeniSayisi; navBadge.style.display='flex'; }
  } else {
    bell?.classList.remove('uyari-bell-yeni');
    if (bellSayac) bellSayac.style.display='none';
    if (navBadge)  navBadge.style.display='none';
  }
}

function guncelStatler() {
  const kritik  = uyarilar.filter(u=>u.seviye==='kritik').length;
  const uyariS  = uyarilar.filter(u=>u.seviye==='uyari').length;
  const yeni    = uyarilar.filter(u=>!u.goruldu).length;
  const goruldu = uyarilar.filter(u=>u.goruldu).length;
  document.getElementById('sCritik').textContent=kritik;
  document.getElementById('sUyari').textContent=uyariS;
  document.getElementById('sYeni').textContent=yeni;
  document.getElementById('sGoruldu').textContent=goruldu;
  document.getElementById('tAktif').textContent=yeni;
  document.getElementById('tGoruldu').textContent=goruldu;
  document.getElementById('tHepsi').textContent=uyarilar.length;
}

function renderHepsi() {
  ['aktif','goruldu','hepsi'].forEach(renderTab);
}

// ===== TAB =====
function tabGit(tab) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1))?.classList.add('on');
  renderTab(tab);
}
document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>tabGit(btn.dataset.tab)));

// ===== TOAST =====
let _tt;
function showToast(msg,type='success'){
  let el=document.getElementById('_t');
  if(!el){el=document.createElement('div');el.id='_t';document.body.appendChild(el);}
  el.className='toast t-'+(type==='success'?'ok':type==='error'?'er':'in');
  el.innerHTML=`<span>${msg}</span><button style="background:none;border:none;color:var(--txd);cursor:pointer;font-size:16px;" onclick="this.parentElement.style.display='none'">✕</button>`;
  el.style.display='flex';clearTimeout(_tt);
  _tt=setTimeout(()=>{if(el)el.style.display='none';},3500);
}



// ===== BAŞLAT =====
// Sayfa açıldığında aktif uyarıları otomatik "görüldü" YAPMIYORUz —
// sadece açma eylemi ikon söndürür, listedekiler kalır
renderHepsi();
guncelBell();
guncelStatler();

// Bu sayfayı açan ziyaretçi gördü — bell sönsün
setTimeout(()=>{
  uyarilar.forEach(u=>{ if(!u.goruldu) u.goruldu=false; }); // goruldu FLAG değişmez, sadece bell söner
  // Bell'i söndür ama uyarılar listede kalır
  const bell=document.getElementById('bellBtn');
  const bs=document.getElementById('bellSayac');
  const nb=document.getElementById('navBadge');
  if(bell) bell.classList.remove('uyari-bell-yeni');
  if(bs) bs.style.display='none';
  if(nb) nb.style.display='none';
}, 1500); // 1.5 sn sonra bell söner, ama liste temizlenmez
</script>
