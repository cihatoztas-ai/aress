<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş | AresPipe</title>
<script>(function(){
  var t=localStorage.getItem('ares_theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  var l=localStorage.getItem('ares_lang')||'tr';
  document.documentElement.setAttribute('lang',l);
  document.documentElement.style.visibility='hidden';
})()</script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--bor) 1px,transparent 1px),linear-gradient(90deg,var(--bor) 1px,transparent 1px);background-size:48px 48px;opacity:0.4;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 50%,transparent 40%,var(--bg) 100%);pointer-events:none;}
.giris-kapsayici{position:relative;z-index:1;width:100%;max-width:420px;padding:24px;}
.logo-alan{text-align:center;margin-bottom:36px;}
.logo-ikon{width:52px;height:52px;background:rgba(45,142,255,.15);border:1px solid rgba(45,142,255,.3);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:14px;}
.logo-baslik{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--tx);letter-spacing:1px;}
.logo-alt{font-size:13px;color:var(--txd);margin-top:4px;}
.giris-kart{background:var(--sur);border:1px solid var(--bor);border-radius:18px;padding:32px;}
.form-grup{margin-bottom:18px;}
.form-etiket{display:block;font-size:12px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:7px;}
.form-input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;font-size:14px;color:var(--tx);font-family:'Barlow',sans-serif;transition:border-color 0.15s,box-shadow 0.15s;outline:none;}
.form-input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(45,142,255,.12);}
.form-input::placeholder{color:var(--txd);}
.sifre-kapsam{position:relative;}
.sifre-goster{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--txd);font-size:16px;padding:4px;transition:color 0.15s;}
.sifre-goster:hover{color:var(--tx);}
.giris-btn{width:100%;background:var(--ac);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;}
.giris-btn:hover{opacity:0.9;}
.giris-btn:active{transform:scale(0.99);}
.giris-btn:disabled{opacity:0.6;cursor:not-allowed;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg);}}
.hata-kutu{display:none;background:rgba(229,62,62,.08);border:1px solid rgba(229,62,62,.25);border-left:3px solid var(--re);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--re);margin-top:16px;line-height:1.5;}
.hata-kutu.goster{display:block;}
.bilgi-kutu{display:none;background:rgba(45,142,255,.06);border:1px solid rgba(45,142,255,.2);border-left:3px solid var(--ac);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--txm);margin-top:16px;}
.bilgi-kutu.goster{display:block;}
.giris-alt{text-align:center;margin-top:20px;font-size:12px;color:var(--txd);}
</style>
<script src="ares-store.js"></script>
</head>
<body>
<div class="giris-kapsayici">
  <div class="logo-alan">
    <div class="logo-ikon">&#128295;</div>
    <div class="logo-baslik">AresPipe</div>
    <div class="logo-alt">Tersane Boru İmalat Takip Sistemi</div>
  </div>
  <div class="giris-kart">
    <div class="form-grup">
      <label class="form-etiket" for="email">E-posta</label>
      <input class="form-input" type="email" id="email" placeholder="ornek@firma.com" autocomplete="email" autofocus>
    </div>
    <div class="form-grup">
      <label class="form-etiket" for="sifre">Şifre</label>
      <div class="sifre-kapsam">
        <input class="form-input" type="password" id="sifre" placeholder="••••••••" autocomplete="current-password" style="padding-right:42px;">
        <button class="sifre-goster" type="button" onclick="sifreGoster()" title="Şifreyi göster">&#128065;</button>
      </div>
    </div>
    <button class="giris-btn" id="girisBtn" onclick="girisYap()">
      <span class="spinner" id="spinner"></span>
      <span id="btnYazi">Giriş Yap</span>
    </button>
    <div class="hata-kutu" id="hataKutu"></div>
    <div class="bilgi-kutu" id="bilgiKutu">Giriş yapılıyor, lütfen bekleyin...</div>
  </div>
  <div class="giris-alt">AresPipe &copy; 2026</div>
</div>
<script>
'use strict';

document.getElementById('email').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('sifre').focus();
});
document.getElementById('sifre').addEventListener('keydown', function(e){
  if(e.key==='Enter') girisYap();
});

function sifreGoster() {
  var inp = document.getElementById('sifre');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function hataGoster(mesaj) {
  var k = document.getElementById('hataKutu');
  k.textContent = mesaj;
  k.classList.add('goster');
  document.getElementById('bilgiKutu').classList.remove('goster');
}

function yukleniyorAc() {
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('btnYazi').textContent = 'Giriş yapılıyor...';
  document.getElementById('girisBtn').disabled = true;
  document.getElementById('hataKutu').classList.remove('goster');
  document.getElementById('bilgiKutu').classList.add('goster');
}

function yukleniyorKapat() {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('btnYazi').textContent = 'Giriş Yap';
  document.getElementById('girisBtn').disabled = false;
  document.getElementById('bilgiKutu').classList.remove('goster');
}

async function girisYap() {
  var email = document.getElementById('email').value.trim();
  var sifre = document.getElementById('sifre').value;
  if (!email) { hataGoster('E-posta adresi boş bırakılamaz.'); return; }
  if (!sifre) { hataGoster('Şifre boş bırakılamaz.'); return; }
  yukleniyorAc();
  try {
    var sonuc = await ARES.girisYap(email, sifre);
    if (sonuc.hata) {
      yukleniyorKapat();
      var mesaj = sonuc.hata;
      if (mesaj.includes('Invalid login')) mesaj = 'E-posta veya şifre hatalı.';
      if (mesaj.includes('Email not confirmed')) mesaj = 'E-posta adresiniz doğrulanmamış.';
      if (mesaj.includes('Too many requests')) mesaj = 'Çok fazla deneme. Lütfen bekleyin.';
      if (mesaj.includes('bağlı değil')) mesaj = 'Sunucuya bağlanılamadı, lütfen bekleyin...';
      hataGoster(mesaj);
      return;
    }
    document.getElementById('bilgiKutu').textContent = 'Giriş başarılı, yönlendiriliyorsunuz...';
    document.getElementById('bilgiKutu').classList.add('goster');
    setTimeout(function() { window.location.href = 'index.html'; }, 600);
  } catch(e) {
    yukleniyorKapat();
    hataGoster('Beklenmeyen hata: ' + e.message);
  }
}

(async function oturumKontrol() {
  try {
    if (typeof ARES === 'undefined') return;
    var oturum = await ARES.oturumKontrol();
    if (oturum) { window.location.href = 'index.html'; }
  } catch(e) { /* sessiz geç */ }
})();

document.documentElement.style.visibility = '';
</script>
</body>
</html>
