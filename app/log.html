<style>
:root{--ac:#2D8EFF;--gr:#16a36e;--re:#e53e3e;--warn:#d97706;--leg:#7c3aed;}
[data-theme=dark]{--bg:#0d1117;--sur:#161b24;--sur2:#1c2333;--bor:#262f3e;--tx:#e6ecf4;--txd:#6b7a90;--txm:#94a3b8;}
[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}



/* SIDEBAR */

[data-theme="dark"] .icon-sun{display:block!important;}[data-theme="dark"] .icon-moon{display:none!important;}
[data-theme="light"] .icon-sun{display:none!important;}[data-theme="light"] .icon-moon{display:block!important;}
[data-theme="slate"] .icon-sun{display:block!important;}[data-theme="slate"] .icon-moon{display:none!important;}
[data-theme="navy"] .icon-sun{display:block!important;}[data-theme="navy"] .icon-moon{display:none!important;}

.uyari-bell{position:absolute;top:10px;right:80px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:all;background:var(--sur);border:1px solid var(--bor);transition:all 0.2s;text-decoration:none;}
.uyari-bell:hover{border-color:var(--re);background:rgba(239,68,68,0.08);}
.uyari-bell-yeni{border-color:rgba(239,68,68,0.5);background:rgba(239,68,68,0.08);animation:bellPulse 2s ease-in-out infinite;}
@keyframes bellPulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3);}50%{box-shadow:0 0 0 6px rgba(239,68,68,0);}}
.uyari-sayac{position:absolute;top:-5px;right:-5px;background:var(--re);color:#fff;font-size:14px;font-weight:800;min-width:18px;height:18px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px;border:2px solid var(--bg);}

/* SAYFA */
.page{padding:28px 28px 40px;}
.page-title-label{font-size:14px;color:var(--txd);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;color:var(--tx);line-height:1;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--txd);margin-bottom:6px;}
.breadcrumb a{color:var(--txd);text-decoration:none;}.breadcrumb a:hover{color:var(--ac);}

/* STAT */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.si-b{background:rgba(45,142,255,.12);color:var(--ac);}
.si-g{background:rgba(22,163,110,.12);color:var(--gr);}
.si-a{background:rgba(217,119,6,.12);color:var(--warn);}
.si-l{background:rgba(124,58,237,.12);color:var(--leg);}
.stat-label{font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.stat-value{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--tx);line-height:1;}

/* FİLTRE BAR */
.fbar{background:var(--sur);border:1px solid var(--bor);border-radius:14px;padding:14px 18px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.fsel{padding:7px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;}
.fsel:focus{border-color:var(--ac);}
.fi-search{padding:7px 12px;border-radius:9px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-family:'Barlow',sans-serif;outline:none;flex:1;min-width:180px;max-width:320px;}
.fi-search:focus{border-color:var(--ac);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;border:none;font-family:'Barlow',sans-serif;}
.btn-g{background:var(--sur2);color:var(--tx);border:1px solid var(--bor);}.btn-g:hover{border-color:var(--ac);color:var(--ac);}
.btn-ac{background:var(--ac);color:#fff;}.btn-ac:hover{filter:brightness(1.1);}
.btn-re{background:rgba(239,68,68,0.10);color:var(--re);border:1px solid rgba(239,68,68,0.25);}.btn-re:hover{background:rgba(239,68,68,0.18);}
.btn-leg{background:rgba(168,85,247,0.10);color:var(--leg);border:1px solid rgba(168,85,247,0.25);}.btn-leg:hover{background:rgba(168,85,247,0.18);}
.ml-auto{margin-left:auto;}

/* LOG TABLO */
.log-kart{background:var(--sur);border:1px solid var(--bor);border-radius:16px;overflow:hidden;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--bor);}
.log-baslik{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;}
.log-sayac{font-size:14px;color:var(--txd);}

table{width:100%;border-collapse:collapse;}
thead th{padding:9px 14px;text-align:left;font-size:14px;font-weight:700;color:var(--txd);text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--bor);background:var(--sur2);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--bor);transition:background 0.12s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--sur2);}
td{padding:10px 14px;font-size:14px;vertical-align:middle;}

/* İŞLEM BADGE */
.islem-badge{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;font-family:'Barlow Condensed',sans-serif;}
.ib-giris{background:rgba(22,163,110,.12);color:var(--gr);}
.ib-kk{background:rgba(45,142,255,.12);color:var(--ac);}
.ib-sevk{background:rgba(217,119,6,.12);color:var(--warn);}
.ib-test{background:rgba(124,58,237,.12);color:var(--leg);}
.ib-durdur{background:rgba(229,62,62,.12);color:var(--re);}
.ib-tanim     {background:rgba(100,116,139,0.12);color:var(--txm);}
.ib-is{background:rgba(22,163,110,.12);color:var(--gr);}
.ib-varsayilan{background:rgba(100,116,139,0.08);color:var(--txd);}

/* ZAMAN SÜTUNU */
.td-zaman{font-size:14px;color:var(--txd);white-space:nowrap;}
.td-zaman .zaman-tarih{display:block;font-weight:600;color:var(--txm);}
.td-zaman .zaman-saat{display:block;font-size:14px;}

/* AKIŞ — timeline view */
.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:14px;padding:12px 20px;border-bottom:1px solid var(--bor);transition:background 0.12s;}
.tl-item:last-child{border-bottom:none;}
.tl-item:hover{background:var(--sur2);}
.tl-zaman{flex-shrink:0;width:100px;font-size:14px;color:var(--txd);line-height:1.6;text-align:right;padding-top:2px;}
.tl-cizgi{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:0;}
.tl-nokta{width:10px;height:10px;border-radius:50%;border:2px solid var(--bor);background:var(--sur);flex-shrink:0;margin-top:4px;}
.tl-cizgi-hat{flex:1;width:2px;background:var(--bor);margin:2px 0;}
.tl-ic{flex:1;}
.tl-islem{margin-bottom:4px;}
.tl-kaynak{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:2px;}
.tl-aciklama{font-size:14px;color:var(--txd);line-height:1.5;}

/* GÖRÜNÜM TOGGLE */
.view-toggle{display:flex;border:1px solid var(--bor);border-radius:9px;overflow:hidden;}
.vt-btn{padding:6px 12px;background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;color:var(--txd);font-family:'Barlow',sans-serif;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.vt-btn.active{background:var(--sur2);color:var(--tx);}

/* SAYFALAMA */
.sayfalama{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--bor);}
.sayfa-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:1px solid var(--bor);background:var(--sur2);color:var(--tx);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.sayfa-btn:hover{border-color:var(--ac);color:var(--ac);}
.sayfa-btn:disabled{opacity:0.4;cursor:not-allowed;}
.sayfa-info{font-size:14px;color:var(--txd);}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:1100;animation:tin 0.3s ease;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.t-ok{border-left:3px solid var(--gr);}
@keyframes tin{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}


/* SOL KENAR RENK (Kural B-01) */
.cl-ac{border-left:3px solid var(--ac) !important;}
.cl-gr{border-left:3px solid var(--gr) !important;}
.cl-re{border-left:3px solid var(--re) !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg{border-left:3px solid var(--leg) !important;}
.bos{text-align:center;padding:48px 20px;color:var(--txd);}
</style>

<script src="ares-layout.js"></script>

<div class="app-shell">

<div class="main-content">

<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;">

    <div class="breadcrumb"><a href="index.html" data-i18n="cmn_anasayfa">Ana Sayfa</a><span>/</span><span data-i18n="log_baslik">İşlem Logu</span></div>
    <h1 class="page-title" data-i18n="log_baslik">İşlem Logu</h1>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button class="btn btn-leg" onclick="csvIndir()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span data-i18n="log_csv_indir">CSV İndir</span>
    </button>
    <button class="btn btn-re" onclick="loguTemizle()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
      <span data-i18n="log_temizle">Logu Temizle</span>

    <button class="btn btn-g" onclick="yenile()">

</div>

<!-- STAT -->
<div class="stat-row">

  <div class="stat-card cl-gr"><div class="stat-icon si-g"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="stat-label" data-i18n="log_stat_bugun">Bugün</div><div class="stat-value" id="sBugun">0</div></div></div>
  <div class="stat-card cl-warn"><div class="stat-icon si-a"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="stat-label" data-i18n="log_stat_kullanici">Kullanıcı Sayısı</div><div class="stat-value" id="sKullanici">0</div></div></div>
  <div class="stat-card cl-leg"><div class="stat-icon si-l"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div><div class="stat-label" data-i18n="log_stat_tip">İşlem Tipi</div><div class="stat-value" id="sTip">0</div></div></div>
</div>

<!-- FİLTRE -->
<div class="fbar cl-ac">
  <input class="fi-search" id="fArama" data-i18n-placeholder="log_ara_placeholder" placeholder="🔍 İşlem, kaynak, açıklama ara…" oninput="renderLog()">
  <select class="fsel" id="fTip" onchange="renderLog()">
    <option value="" data-i18n="log_f_tum_islem">Tüm İşlemler</option>
    <option value="GİRİŞ" data-i18n="log_f_giris">🔐 Giriş</option>
    <option value="KK" data-i18n="log_f_kk">✅ Kalite Kontrol</option>
    <option value="SEVKİYAT" data-i18n="log_f_sevk">📦 Sevkiyat</option>
    <option value="TEST" data-i18n="log_f_test">🧪 Test</option>
    <option value="SPOOL" data-i18n="log_f_spool">⚙️ Spool</option>
    <option value="DEVRE" data-i18n="log_f_devre">🔄 Devre</option>
    <option value="IS" data-i18n="log_f_is">🔧 İş</option>
    <option value="TANIM" data-i18n="log_f_tanim">📋 Tanım</option>
  </select>
  <select class="fsel" id="fSure" onchange="renderLog()">
    <option value="" data-i18n="log_f_tum_zaman">Tüm Zamanlar</option>
    <option value="bugun" data-i18n="log_f_bugun">Bugün</option>
    <option value="hafta" data-i18n="log_f_hafta">Bu Hafta</option>
    <option value="ay" data-i18n="log_f_ay">Bu Ay</option>
  </select>
  <div class="view-toggle ml-auto">
    <button class="vt-btn active" id="vTable" onclick="gorunumSec('table',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span data-i18n="log_gorunum_tablo">Tablo</span>
    </button>
    <button class="vt-btn" id="vTimeline" onclick="gorunumSec('timeline',this)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="22"/><polyline points="17 7 12 2 7 7"/></svg>
      <span data-i18n="log_gorunum_zaman">Zaman Çizelgesi</span>
    </button>
  </div>
</div>

<!-- LOG ALANI -->
<div class="log-kart cl-ac">
  <div class="log-header">
    <div class="log-baslik" data-i18n="log_gecmis">İşlem Geçmişi</div>
    <span class="log-sayac" id="logSayac">— kayıt</span>
  </div>
  <div id="logIcerik"></div>
  <div class="sayfalama" id="sayfalama">
    <button class="sayfa-btn" id="oncekiBtn" onclick="sayfaDegistir(-1)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg> <span data-i18n="cmn_onceki">Önceki</span>
    </button>
    <span class="sayfa-info" id="sayfaInfo">—</span>
    <button class="sayfa-btn" id="sonrakiBtn" onclick="sayfaDegistir(1)">
      <span data-i18n="cmn_sonraki">Sonraki</span> <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

</div><!-- /page -->
</div><!-- /main-content -->
</div><!-- /app-shell -->

function _getLang() {
  return document.documentElement.getAttribute('lang') || localStorage.getItem('ares_lang') || 'tr';
}

function tv(key, fallback) {
  var lang = _getLang();
  var dict = _I18N[lang];
  if (dict && dict[key] !== undefined) return dict[key];
  return fallback !== undefined ? fallback : key;
}

function _applyI18n() {
  var lang = _getLang();
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    var val = tv(key);
    if (val !== key) el.textContent = val;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-placeholder');
    var val = tv(key);
    if (val !== key) el.placeholder = val;
  });
}

window._onLangChange = function() {
  _applyI18n();
  renderLog();
};

new MutationObserver(function() {
  _applyI18n();
  renderLog();
}).observe(document.documentElement, { attributes: true, attributeFilter: ['lang'] });

// ─── GÜVENLİK — G-01 ────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ─── STATE ────────────────────────────────────────────────────────────
let GORUNUM = 'table';
let SAYFA = 1;
const SAYFA_BOYUT = 25;
let FILTERED = [];

// ─── LOG YÜKLE ───────────────────────────────────────────────────────
function logYukle() {
  try {
    const raw = JSON.parse(localStorage.getItem('ares_islemLog') || '[]');
    const map = {};
    raw.forEach(function(l) { map[l.id] = l; });
    return Object.values(map).sort(function(a,b) { return b.id.localeCompare(a.id); });
  } catch(e) { return []; }
}

// ─── İŞLEM TİPİ RENK / BADGE ─────────────────────────────────────────
function islemRenk(islem) {
  if (!islem) return 'ib-varsayilan';
  const i = islem.toUpperCase();
  if (i.includes('GİRİŞ') || i.includes('GIRIS')) return 'ib-giris';
  if (i.includes('KK'))     return 'ib-kk';
  if (i.includes('SEVK'))   return 'ib-sevk';
  if (i.includes('TEST'))   return 'ib-test';
  if (i.includes('DURDUR') || i.includes('DEVRE')) return 'ib-durdur';
  if (i.includes('TANIM'))  return 'ib-tanim';
  if (i.includes('IS_') || i.includes('İŞ'))  return 'ib-is';
  return 'ib-varsayilan';
}

function islemLabel(islem) {
  if (!islem) return '—';
  var i = islem.toUpperCase();
  if (i === 'GİRİŞ'        || i === 'GIRIS')        return tv('log_il_giris',        'Giriş');
  if (i === 'KK_GONDER')                             return tv('log_il_kk_gonder',    'KK Gönderildi');
  if (i === 'KK_ONAYLA')                             return tv('log_il_kk_onayla',    'KK Onaylandı');
  if (i === 'KK_RED')                                return tv('log_il_kk_red',       'KK Reddedildi');
  if (i === 'SEVKİYAT'     || i === 'SEVKIYAT')      return tv('log_il_sevk',         'Sevkiyat');
  if (i === 'TEST_OLUSTUR')                          return tv('log_il_test_olustur', 'Test Oluşturuldu');
  if (i === 'TEST_SONUC')                            return tv('log_il_test_sonuc',   'Test Sonucu');
  if (i === 'DEVRE_DURDUR')                          return tv('log_il_devre_durdur', 'Devre Durduruldu');
  if (i === 'SPOOL_DURDUR')                          return tv('log_il_spool_durdur', 'Spool Durduruldu');
  if (i === 'IS_BASLAT')                             return tv('log_il_is_baslat',    'İş Başlatıldı');
  if (i === 'IS_BITIR')                              return tv('log_il_is_bitir',     'İş Bitirildi');
  if (i === 'TANIM_EKLE')                            return tv('log_il_tanim_ekle',   'Tanım Eklendi');
  if (i === 'TANIM_SIL')                             return tv('log_il_tanim_sil',    'Tanım Silindi');
  return islem;
}

function islemIkon(islem) {
  if (!islem) return '⚙️';
  const i = islem.toUpperCase();
  if (i.includes('GİRİŞ') || i.includes('GIRIS')) return '🔐';
  if (i.includes('KK'))     return '✅';
  if (i.includes('SEVK'))   return '📦';
  if (i.includes('TEST'))   return '🧪';
  if (i.includes('DURDUR')) return '⛔';
  if (i.includes('DEVRE'))  return '🔄';
  if (i.includes('TANIM'))  return '📋';
  if (i.includes('IS_'))    return '🔧';
  return '⚙️';
}

// ─── FİLTRELE ────────────────────────────────────────────────────────
function filtrele(loglar) {
  const arama = document.getElementById('fArama').value.toLowerCase();
  const tip    = document.getElementById('fTip').value.toUpperCase();
  const sure   = document.getElementById('fSure').value;
  const bugun  = new Date(); bugun.setHours(0,0,0,0);
  const haftaBas = new Date(bugun); haftaBas.setDate(bugun.getDate() - bugun.getDay() + 1);
  const ayBas  = new Date(bugun.getFullYear(), bugun.getMonth(), 1);

  return loglar.filter(l => {
    if (arama && ![l.islem,l.kaynak,l.aciklama].join(' ').toLowerCase().includes(arama)) return false;
    if (tip && !l.islem?.toUpperCase().includes(tip)) return false;
    if (sure) {
      const d = tarihParse(l.tarih);
      if (!d) return true;
      if (sure==='bugun' && d < bugun) return false;
      if (sure==='hafta' && d < haftaBas) return false;
      if (sure==='ay'    && d < ayBas)    return false;
    }
    return true;
  });
}

function tarihParse(str) {
  if (!str) return null;
  try {
    const parts = str.split(', ');
    if (parts.length < 2) return null;
    const [gun,ay,yil] = parts[0].split('.').map(Number);
    return new Date(yil, ay-1, gun);
  } catch { return null; }
}

// ─── RENDER ──────────────────────────────────────────────────────────
function renderLog() {
  SAYFA = 1;
  const loglar = demoLogEkle();
  FILTERED = filtrele(loglar);

  // Stat
  document.getElementById('sToplam').textContent = loglar.length;
  const bugun = new Date(); bugun.setHours(0,0,0,0);
  document.getElementById('sBugun').textContent = loglar.filter(l => { const d=tarihParse(l.tarih); return d&&d>=bugun; }).length;
  const kullanicilar = new Set(loglar.map(l=>l.kaynak));
  document.getElementById('sKullanici').textContent = kullanicilar.size;
  const tipler = new Set(loglar.map(l=>l.islem));
  document.getElementById('sTip').textContent = tipler.size;

  renderSayfa();
}

function renderSayfa() {
  const toplam = FILTERED.length;
  const toplamSayfa = Math.max(1, Math.ceil(toplam / SAYFA_BOYUT));
  if (SAYFA > toplamSayfa) SAYFA = toplamSayfa;
  const bas = (SAYFA-1) * SAYFA_BOYUT;
  const bit = Math.min(bas + SAYFA_BOYUT, toplam);
  const sayfa = FILTERED.slice(bas, bit);

  document.getElementById('logSayac').textContent = toplam + tv('log_kayit_sayisi', ' kayıt');
  document.getElementById('sayfaInfo').textContent = SAYFA + ' / ' + toplamSayfa + ' sayfa (' + bas+1 + '–' + bit + ')';
  document.getElementById('oncekiBtn').disabled = SAYFA <= 1;
  document.getElementById('sonrakiBtn').disabled = SAYFA >= toplamSayfa;

  if (!sayfa.length) {
    document.getElementById('logIcerik').innerHTML = '<div class="bos">' + esc(tv('log_kayit_bulunamadi', 'Kayıt bulunamadı')) + '</div>';
    return;
  }

  if (GORUNUM === 'table') renderTable(sayfa);
  else renderTimeline(sayfa);
}

      <tbody>${kayitlar.map((l,i) => `
        <tr>
          <td style="font-size:14px;color:var(--txd);font-family:'Barlow Condensed',sans-serif;">${FILTERED.indexOf(l)+1}</td>
          <td class="td-zaman"><span class="zaman-tarih">${esc(zamanParca(l.tarih).tarih)}</span><span class="zaman-saat">${esc(zamanParca(l.tarih).saat)}</span></td>
          <td><span class="islem-badge ${islemRenk(l.islem)}">${islemIkon(l.islem)} ${esc(islemLabel(l.islem))}</span></td>
          <td style="font-size:14px;font-weight:600;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(l.yapan||'—')}</td>
          <td style="font-size:14px;color:var(--txm);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(l.kaynak||'—')}</td>
          <td style="font-size:14px;color:var(--txm);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(l.aciklama||'')}">${esc(l.aciklama||'—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderTimeline(kayitlar) {
  document.getElementById('logIcerik').innerHTML = `
    <div class="timeline">
      ${kayitlar.map((l,i) => `
        <div class="tl-item">
          <div class="tl-zaman">${esc(zamanParca(l.tarih).tarih)}<br><strong>${esc(zamanParca(l.tarih).saat)}</strong></div>
          <div class="tl-cizgi">
            <div class="tl-nokta" style="background:${nokRenk(l.islem)};border-color:${nokRenk(l.islem)};"></div>
            ${i < kayitlar.length-1 ? '<div class="tl-cizgi-hat"></div>' : ''}
          </div>
          <div class="tl-ic">
            <div class="tl-islem"><span class="islem-badge ${islemRenk(l.islem)}">${islemIkon(l.islem)} ${esc(islemLabel(l.islem))}</span></div>
            <div class="tl-kaynak">${esc(l.yapan||'—')} <span style="color:var(--txd);font-weight:400;">· ${esc(l.kaynak||'—')}</span></div>
            <div class="tl-aciklama">${esc(l.aciklama||'—')}</div>
          </div>
        </div>`).join('')}
    </div>`;
}

function nokRenk(islem) {
  const i = (islem||'').toUpperCase();
  if (i.includes('GİRİŞ') || i.includes('GIRIS')) return 'var(--gr)';
  if (i.includes('KK'))     return 'var(--ac)';
  if (i.includes('SEVK'))   return 'var(--warn)';
  if (i.includes('TEST'))   return 'var(--leg)';
  if (i.includes('DURDUR')) return 'var(--re)';
  return 'var(--txd)';
}

function zamanParca(str) {
  if (!str) return {tarih:'—',saat:'—'};
  const parts = str.split(', ');
  return { tarih: parts[0]||'—', saat: parts[1]||'—' };
}

function gorunumSec(tip, btn) {
  GORUNUM = tip;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSayfa();
}

// ─── SAYFALAMA ───────────────────────────────────────────────────────
function sayfaDegistir(yon) { SAYFA += yon; renderSayfa(); }

// ─── CSV İNDİR ───────────────────────────────────────────────────────
function csvIndir() {
  const baslik = 'ID,Tarih,İşlem,Kaynak,Açıklama\n';
  const satir = FILTERED.map(l =>
    `"${l.id||''}","${l.tarih||''}","${l.islem||''}","${(l.kaynak||'').replace(/"/g,'""')}","${(l.aciklama||'').replace(/"/g,'""')}"`
  ).join('\n');
  const blob = new Blob(['\uFEFF'+baslik+satir], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ares-log-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  toast(tv('log_csv_indirildi', 'CSV indirildi') + ' (' + FILTERED.length + tv('log_kayit_sayisi', ' kayıt') + ')');
}

// ─── LOGU TEMİZLE ────────────────────────────────────────────────────
function loguTemizle() {
  if (!confirm(tv('log_temizle_onay', 'Tüm log kayıtları silinecek. Emin misiniz?'))) return;
  localStorage.setItem('ares_islemLog', '[]');
  renderLog();
  toast(tv('log_temizlendi', 'Log temizlendi'));
}

function yenile() { renderLog(); toast(tv('log_yenilendi', 'Yenilendi')); }

document.documentElement.style.visibility = '';
