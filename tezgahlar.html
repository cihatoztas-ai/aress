[data-theme=light-anthracite]{--bg:#d8dde4;--sur:#e4e9ef;--sur2:#d0d7e0;--bor:#bcc5d0;--tx:#141e2b;--txm:#3a4f63;--txd:#637080;}




*{box-sizing:border-box;margin:0;padding:0;}







.sum-bar{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-bottom:24px;
}
.sum-card{
  background: var(--sur);
  border:1px solid var(--bor);
  border-radius:16px;
  padding:16px 20px;
  text-align:center;
}
.sum-card .sl{
  font-size:12px;
  font-weight:500;
  color: var(--txd);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:8px;
}
.sum-card .sv{
  font-size:32px;
  font-weight:700;
}
.sum-card.imalat .sv{color:var(--ac);}
.sum-card.argon .sv{color:var(--warn);}
.sum-card.gazalti .sv{color:var(--gr);}

.filters{
  display:flex;
  gap:8px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.filter-btn{
  font-size:13px;
  font-weight:500;
  padding:8px 20px;
  border-radius:40px;
  border:1px solid var(--bor);
  background:transparent;
  color: var(--txm);
  cursor:pointer;
  transition:all 0.2s;
}
.filter-btn:hover{
  background: var(--sur2);
  color: var(--tx);
  border-color: var(--bor);
}
.filter-btn.on{
  background: var(--tx);
  color: var(--bg);
  border-color: var(--tx);
  font-weight:600;
}


/* SOL KENAR RENK (Kural B-01) */
.cl-ac{border-left:3px solid var(--ac) !important;}
.cl-gr{border-left:3px solid var(--gr) !important;}
.cl-re{border-left:3px solid var(--re) !important;}
.cl-warn{border-left:3px solid var(--warn) !important;}
.cl-leg{border-left:3px solid var(--leg) !important;}
/* ===== LİSTE/TABLO GÖRÜNÜMÜ ===== */
.grid{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Tablo başlık satırı */
.grid-header{
  display:grid;
  grid-template-columns: 240px 170px 1fr 160px 140px 300px;
  gap:0;
  padding:0 8px 6px 16px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.6px;
  color: var(--txd);
  border-bottom:1px solid var(--bor);
  margin-bottom:4px;
}

.card{
  background: var(--sur);
  border:1px solid var(--bor);
  border-radius:12px;
  cursor:pointer;
  transition:all 0.15s;
  display:grid;
  grid-template-columns: 240px 170px 1fr 160px 140px 300px;
  grid-template-rows: 1fr 3px;
  align-items:center;
  min-height:102px;
  overflow:hidden;
}
.card:hover{
  border-color: var(--bor);
  background: var(--sur2);
  box-shadow:0 4px 12px -2px rgba(0,0,0,0.3);
}

.border-aktif{border-left:4px solid #10b981;}
.border-bosta{border-left:4px solid #ef4444;}
.border-mola{border-left:4px solid #f59e0b;}

/* === KİŞİ SÜTUNU === */
.c-head{
  padding:8px 12px;
  display:flex;
  gap:10px;
  align-items:center;
}
.person-photo{
  width:36px;
  height:36px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid var(--bor);
  flex-shrink:0;
}
.person-info{
  flex:1;
  min-width:0;
}
.c-name{
  font-size:13px;
  font-weight:600;
  color: var(--tx);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.c-role{
  font-size:11px;
  color: var(--txd);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.c-role strong{
  color:var(--warn);
  font-weight:600;
}
.s-pill{
  display:inline-block;
  font-size:10px;
  font-weight:700;
  padding:2px 8px;
  border-radius:20px;
  margin-top:3px;
  letter-spacing:0.3px;
}
.sp-aktif{
  background:rgba(16,185,129,0.1);
  color:var(--gr);
  border:1px solid rgba(16,185,129,0.3);
}
.sp-bosta{
  background:rgba(239,68,68,0.1);
  color:var(--re);
  border:1px solid rgba(239,68,68,0.3);
}
.sp-mola{
  background:rgba(245,158,11,0.1);
  color:var(--warn);
  border:1px solid rgba(245,158,11,0.3);
}

/* === MESAI SÜTUNU === */
.work-hours{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:4px;
  padding:8px 10px;
  border-left:1px solid var(--bor);
}
.work-time{
  font-size:12px;
  color: var(--txm);
  white-space:nowrap;
}
.work-time span{
  color:var(--warn);
  font-weight:600;
  margin:0 1px;
}
.work-controls{
  display:flex;
  gap:2px;
}
.work-btn{
  background: var(--sur);
  border:1px solid var(--bor);
  color: var(--txm);
  width:18px;
  height:18px;
  border-radius:4px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  line-height:1;
}
.work-btn:hover{
  background: var(--bor);
  color: var(--tx);
}

/* === SPOOL SÜTUNU === */
.spool-box, .no-job{
  padding:8px 12px;
  border-left:1px solid var(--bor);
  display:flex;
  flex-direction:column;
  justify-content:center;
  background:transparent;
  border-radius:0;
  margin:0;
  min-height:unset;
  height:100%;
}
.spool-no{
  font-size:12px;
  font-weight:700;
  color:var(--ac);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.spool-meta{
  display:flex;
  flex-wrap:wrap;
  gap:4px 12px;
}
.sm-row{
  display:flex;
  align-items:center;
  gap:4px;
}
.sm-label{
  font-size:10px;
  color: var(--txd);
}
.sm-val{
  font-size:11px;
  font-weight:600;
  color: var(--tx);
}
.no-job{
  text-align:left;
  color: var(--txd);
  font-size:12px;
  font-style:italic;
  justify-content:center;
  align-items:center;
}

/* === TIMER SÜTUNU === */
.timer-row{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:12px 14px;
  border-left:1px solid var(--bor);
  gap:4px;
}
.t-label{
  font-size:10px;
  color: var(--txd);
  text-transform:uppercase;
  letter-spacing:0.5px;
  white-space:nowrap;
}
.t-val{
  font-size:24px;
  font-weight:700;
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
}
.tv-g{color:var(--gr);}
.tv-r{color:var(--re);}
.tv-y{color:var(--warn);}

.idle-warn{
  display:flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  color:var(--re);
  font-weight:600;
  margin-top:2px;
}
.iw-dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--re);
  animation:pulse 1.5s infinite;
  flex-shrink:0;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* === TAMAMLANAN SÜTUNU === */
.col-eff{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:12px 16px;
  border-left:1px solid var(--bor);
  height:100%;
  gap:4px;
}
.completed-count{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.completed-label{
  font-size:10px;
  font-weight:600;
  color: var(--txd);
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.completed-value{
  font-size:36px;
  font-weight:700;
  color:var(--warn);
  line-height:1;
}

.eff-bar{
  grid-column: 1 / -1;
  grid-row: 2;
  height:3px;
  background: var(--bor);
  display:flex;
  overflow:hidden;
  border-radius:0 0 12px 12px;
  opacity:0.55;
}
.eff-aktif{background:var(--gr);}
.eff-pasif{background:var(--re);}

/* === SON İŞ SÜTUNU === */
.prev-job{
  padding:14px 16px;
  border-left:1px solid var(--bor);
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
  height:100%;
}
.prev-spool{

  font-weight:600;

  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:4px;
}
.prev-datetime{

  flex-wrap:wrap;
  gap:3px 10px;
  font-size:11px;
  color: var(--txm);
}
.prev-datetime span{
  color:var(--warn);
  font-weight:600;
}
.prev-datetime i{
  color: var(--txd);
  font-style:normal;
}

var activeFilter = "hepsi";

function pad(n) { return String(n).padStart(2, "0"); }
function secToHMS(s) {
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  return pad(h) + ":" + pad(m) + ":" + pad(sec);
}

function filteredPersonel() {
  if (activeFilter === "hepsi") return personel;
  if (["aktif", "bosta", "mola"].includes(activeFilter)) {
    return personel.filter(p => p.durum === activeFilter);

function renderSummary() {

function adjustWorkHours(personId, tip, delta) {
  var p = personel.find(p => p.id === personId);
  if (!p) return;
  
  var saat, dakika;
  
  if (tip === 'giris') {
    [saat, dakika] = p.girisSaat.split(":").map(Number);
    dakika += delta * 30; // 30 dakika artış/azalış
  } else {
    [saat, dakika] = p.cikisSaat.split(":").map(Number);
    dakika += delta * 30; // 30 dakika artış/azalış
  }
  
  // Dakika düzeltme
  if (dakika >= 60) {
    saat += Math.floor(dakika / 60);
    dakika = dakika % 60;
  }
  if (dakika < 0) {
    saat += Math.floor(dakika / 60) - 1;
    dakika = 60 + (dakika % 60);
  }
  
  if (saat < 0) saat = 0;
  if (saat > 23) saat = 23;
  
  var yeniSaat = pad(saat) + ":" + pad(dakika);
  
  if (tip === 'giris') {
    p.girisSaat = yeniSaat;
  } else {
    p.cikisSaat = yeniSaat;
  }
  
  var card = document.querySelector(`.card[data-person-id="${personId}"]`);
  if (card) {
    var workTimeSpan = card.querySelector(".work-time");
    if (workTimeSpan) {
      workTimeSpan.innerHTML = `🕒 <span>${p.girisSaat}</span> → <span>${p.cikisSaat}</span>`;
    }
  }
}

    : Math.floor((Date.now() - p.boslayanAt) / 1000);
  
  var timerStr = secToHMS(timerSec);
  var tClass = p.durum === "aktif" ? "tv-g" : p.durum === "mola" ? "tv-y" : "tv-r";
  
  var spClass = p.durum === "aktif" ? "sp-aktif" : p.durum === "mola" ? "sp-mola" : "sp-bosta";
  var spLabel = p.durum === "aktif" ? "AKTİF" : p.durum === "mola" ? "MOLA" : "BOŞTA";
  var bClass = p.durum === "aktif" ? "border-aktif" : p.durum === "mola" ? "border-mola" : "border-bosta";
  
  var aktifPct = Math.round(p.aktifDk / (p.aktifDk + p.pasifDk) * 100) || 0;
  var pasifPct = 100 - aktifPct;
  
  var aktifH = Math.floor(p.aktifDk / 60);
  var aktifM = p.aktifDk % 60;
  var pasifH = Math.floor(p.pasifDk / 60);
  var pasifM = p.pasifDk % 60;

  var jobSection = p.anlik ? `
    <div class="spool-box">
      <div class="spool-no">${p.anlik.spool}</div>
      <div class="spool-meta">
        <div class="sm-row"><span class="sm-label">Mlz:</span><span class="sm-val">${p.anlik.malzeme}</span></div>
        <div class="sm-row"><span class="sm-label">Çap:</span><span class="sm-val">${p.anlik.cap}</span></div>
        <div class="sm-row"><span class="sm-label">Ağr:</span><span class="sm-val">${p.anlik.agirlik}</span></div>
        <div class="sm-row"><span class="sm-label">İE:</span><span class="sm-val">${p.anlik.isEmri}</span></div>
      </div>
    </div>
  ` : `<div class="no-job">⏳ Atanmış iş yok</div>`;

  var idleWarn = (p.durum === "bosta" && timerSec > 600) ? `
    <div class="idle-warn">
      <div class="iw-dot"></div>
      Uzun süredir boşta!
    </div>
  ` : "";

  return `
    <div class="card ${bClass}" data-person-id="${p.id}" onclick="window.location='/personel/${p.id}'">

      <!-- 1. KİŞİ -->
      <div class="c-head">
        <img class="person-photo" src="${p.foto}" alt="${p.ad}" onerror="this.src='https://i.pravatar.cc/150?u=${p.id}'">
        <div class="person-info">
          <div class="c-name">${p.ad}</div>
          <div class="c-role">${p.rol}${p.islemTuru ? ' · <strong>' + p.islemTuru + '</strong>' : ''}</div>
          <div class="s-pill ${spClass}">${spLabel}</div>
        </div>
      </div>

      <!-- 2. MESAİ -->
      <div class="work-hours">
        <div class="work-time">
          🕒 <span>${p.girisSaat}</span> → <span>${p.cikisSaat}</span>
        </div>
        <div class="work-controls">
          <button class="work-btn" onclick="event.stopPropagation(); adjustWorkHours(${p.id}, 'giris', -1)">−</button>
          <button class="work-btn" onclick="event.stopPropagation(); adjustWorkHours(${p.id}, 'giris', 1)">+</button>
          <button class="work-btn" onclick="event.stopPropagation(); adjustWorkHours(${p.id}, 'cikis', -1)">−</button>
          <button class="work-btn" onclick="event.stopPropagation(); adjustWorkHours(${p.id}, 'cikis', 1)">+</button>
        </div>
      </div>

      <!-- 3. ANLÍK İŞ -->
      ${jobSection}

      <!-- 4. TIMER -->
      <div class="timer-row">
        <span class="t-label">${p.durum === "aktif" ? "İş Süresi" : p.durum === "mola" ? "Mola" : "Boşta"}</span>
        <span class="t-val ${tClass}" data-timer-id="${p.id}">${timerStr}</span>
        ${idleWarn}
      </div>

      <!-- 5. TAMAMLANAN -->
      <div class="col-eff">
        <div class="completed-count">
          <span class="completed-value">${p.tamamlanan}</span>
          <span class="completed-label">İş</span>
        </div>
      </div>

      <!-- 6. SON İŞ -->
      <div class="prev-job">
        <div class="prev-spool">${p.son.spool}</div>
        <div class="prev-datetime">
          <span>Başlama:</span> ${p.son.baslaTarih} ${p.son.baslaSaat} <i>|</i>
          <span>Bitiş:</span> ${p.son.bitisTarih} ${p.son.bitisSaat} <i>|</i>
          <span>Süre:</span> ${p.son.sure}
        </div>
      </div>

      <!-- ALT ŞERİT (tüm kart genişliğinde) -->
      <div class="eff-bar">
        <div class="eff-aktif" style="width:${aktifPct}%;"></div>
        <div class="eff-pasif" style="width:${pasifPct}%;"></div>
      </div>

    </div>
  `;
}

function renderGrid() {
  var fp = filteredPersonel();
  document.getElementById("grid").innerHTML = fp.map(cardHTML).join("");
}

function updateTimers() {
  var fp = filteredPersonel();
  fp.forEach(p => {
    var timerSec = p.durum === "aktif" 
      ? Math.floor((Date.now() - p.baslangicAt) / 1000)
      : Math.floor((Date.now() - p.boslayanAt) / 1000);
    
    var timerEl = document.querySelector(`.t-val[data-timer-id="${p.id}"]`);
    if (timerEl) timerEl.textContent = secToHMS(timerSec);
  });
  
  var n = new Date();
  document.getElementById("clk").textContent = 
    n.toLocaleDateString("tr-TR", {weekday:"long",day:"2-digit",month:"long"}) + 
    " — " + pad(n.getHours()) + ":" + pad(n.getMinutes()) + ":" + pad(n.getSeconds());
}

setInterval(function() {
  var now = new Date();
  var saat = now.getHours();
  var dakika = now.getMinutes();
  
  var molaZamani = (
    (saat === 10 && dakika <= 15) ||
    (saat === 12 && dakika <= 60) ||
    (saat === 15 && dakika <= 15)
  );
  
  if (molaZamani) {
    var degisti = false;
    personel.forEach(p => {
      if (p.durum === "aktif") {
        p.durum = "mola";
        p.boslayanAt = Date.now();
        degisti = true;
      }
    });
    if (degisti) renderGrid();
  }
}, 60000);

renderSummary();
renderGrid();
setInterval(updateTimers, 1000);
updateTimers();
</script>

</div><!-- /.page -->
</div><!-- /.main-content -->
</div><!-- /.app-shell -->



</body>
</html>
